# 每日流量收益报告 + 飞书通知 - GitHub Actions
# 每天北京时间 09:00 自动运行，也可以通过 workflow_dispatch 手动触发

name: Daily Report & Feishu Notification

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Report
        run: python3 scripts/daily_report.py

      - name: Commit Report
        run: |
          git config user.name "Daily Report Bot"
          git config user.email "bot@healthcalc.com"
          git add reports/ dashboard-data.json
          git diff --staged --quiet || git commit -m "📊 每日报告 $(date +%Y-%m-%d)"
          git push

      - name: Send Feishu Notification
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: python3 scripts/send_feishu_report.py
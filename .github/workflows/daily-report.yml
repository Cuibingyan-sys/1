name: 每日流量与收益报告

on:
  schedule:
    # 每天北京时间早上8点
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests --break-system-packages

      - name: 生成每日报告
        run: |
          python3 << 'PYEOF'
          import json, os, datetime
          from pathlib import Path

          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8)))
          today = now.strftime("%Y-%m-%d")
          yesterday = (now - datetime.timedelta(days=1)).strftime("%Y-%m-%d")

          report = {
              "generated_at": now.isoformat(),
              "date": today,
              "website": "https://1-seven-lovat-14.vercel.app",
              "traffic": {
                  "visitors": "N/A",
                  "pageviews": "N/A", 
                  "top_pages": [],
                  "sources": [],
                  "note": "需要配置 GA4 后自动获取真实数据"
              },
              "revenue": {
                  "estimated_earnings": "N/A",
                  "impressions": "N/A",
                  "clicks": "N/A",
                  "note": "需要配置 AdSense 后自动获取真实数据"
              },
              "status": {
                  "site_online": True,
                  "ga4_configured": False,
                  "adsense_configured": False,
                  "gtm_configured": False,
              }
          }

          # 检查是否已有 Google 服务配置
          svc_file = Path("google_services.json")
          if svc_file.exists():
              with open(svc_file) as f:
                  svc = json.load(f)
              if svc.get("ga4_measurement_id"):
                  report["status"]["ga4_configured"] = True
              if svc.get("adsense_publisher_id"):
                  report["status"]["adsense_configured"] = True
              if svc.get("gtm_container_id"):
                  report["status"]["gtm_configured"] = True

          # 保存报告
          os.makedirs("reports", exist_ok=True)
          report_path = f"reports/daily-{today}.json"
          with open(report_path, "w", encoding="utf-8") as f:
              json.dump(report, f, ensure_ascii=False, indent=2)

          # 更新最新报告
          with open("reports/latest.json", "w", encoding="utf-8") as f:
              json.dump(report, f, ensure_ascii=False, indent=2)

          # 更新仪表盘数据
          dashboard_data = {
              "updated": now.isoformat(),
              "traffic": report["traffic"],
              "revenue": report["revenue"],
              "status": report["status"],
          }
          with open("dashboard-data.json", "w", encoding="utf-8") as f:
              json.dump(dashboard_data, f, ensure_ascii=False, indent=2)

          print(f"✅ 每日报告已生成: {today}")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PYEOF

      - name: 提交报告
        run: |
          git config user.name "Daily Report Bot"
          git config user.email "report@healthtools.bot"
          git add reports/ dashboard-data.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "📊 每日报告: $(date +%Y-%m-%d)"
            git push
          fi
name: 每日流量与收益报告

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成每日报告
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          ADSENSE_ACCOUNT_ID: ${{ secrets.ADSENSE_ACCOUNT_ID }}
          GOOGLE_ACCESS_TOKEN: ${{ secrets.GOGLE_ACCESS_TOKEN }}
        run: python3 generate_daily_report.py

      - name: 提交报告
        run: |
          git config user.name "Daily Report Bot"
          git config user.email "report@healthtools.bot"
          git add reports/ dashboard-data.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Daily report: $(date +%Y-%m-%d)"
            git push
          fi
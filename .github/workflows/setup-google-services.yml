name: 自动设置 Google 服务

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        type: choice
        options:
          - '创建 GA4 + GTM + AdSense'
          - '仅更新代码 (已有ID)'
        default: '创建 GA4 + GTM + AdSense'
      ga4_id:
        description: 'GA4 测量 ID (如 G-XXXXXXXXXX)'
        required: false
      gtm_id:
        description: 'GTM 容器 ID (如 GTM-XXXXXXX)'
        required: false
      adsense_id:
        description: 'AdSense 发布商 ID (如 ca-pub-XXXXXXXXXXXX)'
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests --break-system-packages

      - name: 创建 Google 服务
        if: github.event.inputs.mode == '创建 GA4 + GTM + AdSense'
        run: python setup_google_services.py
        timeout-minutes: 10

      - name: 仅更新代码
        if: github.event.inputs.mode == '仅更新代码 (已有ID)'
        run: |
          python3 -c "
          import os, re
          from pathlib import Path
          ga4_id = '${{ github.event.inputs.ga4_id }}'
          gtm_id = '${{ github.event.inputs.gtm_id }}'
          adsense_id = '${{ github.event.inputs.adsense_id }}'
          
          for f in Path('.').glob('*.html'):
              if f.name == 'dashboard.html':
                  continue
              content = f.read_text(encoding='utf-8')
              original = content
              if ga4_id and ga4_id != 'G-XXXXXXXXXX':
                  content = content.replace('G-XXXXXXXXXX', ga4_id)
              if gtm_id and gtm_id != 'GTM-XXXXXXX':
                  content = content.replace('GTM-XXXXXXX', gtm_id)
              if adsense_id and adsense_id != 'ca-pub-XXXXXXXXXXXXXXXX':
                  content = content.replace('ca-pub-XXXXXXXXXXXXXXXX', adsense_id)
              if content != original:
                  f.write_text(content, encoding='utf-8')
                  print(f'Updated: {f.name}')
          
          import json
          result = {
              'ga4_measurement_id': ga4_id if ga4_id != 'G-XXXXXXXXXX' else None,
              'gtm_container_id': gtm_id if gtm_id != 'GTM-XXXXXXX' else None,
              'adsense_publisher_id': adsense_id if adsense_id != 'ca-pub-XXXXXXXXXXXXXXXX' else None,
          }
          with open('google_services.json', 'w') as fp:
              json.dump(result, fp, ensure_ascii=False, indent=2)
          "

      - name: 提交变更
        if: success()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add *.html google_services.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "自动更新: Google 服务 ID 配置 [skip ci]"
            git push
            echo "✅ 代码已推送，Vercel 将自动部署"
          fi